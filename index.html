<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>VocabSmith</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;700&display=swap');

      body {
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
      }

      /* Prevent page jump when keyboard opens on mobile */
      body.keyboard-open {
        position: fixed;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .font-serif-sc {
        font-family: 'Noto Serif SC', serif;
      }

      /* Print Specific Styles */
      @media print {
        @page {
          margin: 0.5cm;
          size: A4;
        }

        html, body {
          height: auto !important;
          overflow: visible !important;
        }

        body {
          background: white !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        #root {
          height: auto !important;
          overflow: visible !important;
        }

        .no-print,
        nav,
        header,
        footer {
          display: none !important;
        }

        .print-only,
        #print-layout {
          display: block !important;
          visibility: visible !important;
          position: static !important;
          overflow: visible !important;
          height: auto !important;
        }

        #print-layout > div {
          page-break-after: always;
          page-break-before: always;
          break-after: page;
          break-before: page;
          -webkit-column-break-after: always;
          -webkit-column-break-before: always;
          overflow: visible !important;
          height: auto !important;
          min-height: 0 !important;
          margin: 0 !important;
          padding: 0.5cm !important;
          box-sizing: border-box !important;
          border: none !important;
        }

        #print-layout > div:first-child {
          page-break-before: auto;
          break-before: auto;
          -webkit-column-break-before: auto;
        }

        #print-layout > div:last-child {
          page-break-after: auto;
          break-after: auto;
          -webkit-column-break-after: auto;
        }

        #preview-table,
        .bg-white.rounded-xl {
          display: none !important;
        }

        #print-layout table {
          font-size: 10px;
          width: 100%;
        }

        #print-layout th,
        #print-layout td {
          padding: 3px 2px !important;
          height: auto !important;
        }

        #print-layout tbody tr {
          page-break-inside: avoid !important;
          break-inside: avoid;
        }
      }

      .print-only,
      #print-layout {
        display: none;
      }

      /* Custom print break classes */
      .page-break-after-always {
        page-break-after: always;
        break-after: page;
        -webkit-column-break-after: always;
      }

      .page-break-before-always {
        page-break-before: always;
        break-before: page;
        -webkit-column-break-before: always;
      }

      .page-break-inside-avoid {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      /* Show print layout when printing class is added */
      #print-layout.printing {
        display: block !important;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-slate-800">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
